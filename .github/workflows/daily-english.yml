name: Daily English Study

on:
  schedule:
    # GitHub Actions uses UTC. 20:00 UTC is 04:00 Asia/Shanghai next day.
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional Beijing date (YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-english-study
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate content
        id: generate
        env:
          RUN_DATE: ${{ inputs.date }}
        run: |
          args=()
          if [[ -n "$RUN_DATE" ]]; then
            args+=(--date "$RUN_DATE")
          fi
          python scripts/daily_english.py --generate-only "${args[@]}"

      - name: Commit daily archive and state
        if: steps.generate.outputs.content_path != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily data/state.json
          if ! git diff --cached --quiet; then
            git commit -m "Add English study content: $(basename '${{ steps.generate.outputs.content_path }}')"
            git push
          fi

      - name: Send to DingTalk
        if: steps.generate.outputs.content_path != ''
        run: python scripts/daily_english.py --notify-file "${{ steps.generate.outputs.content_path }}"
